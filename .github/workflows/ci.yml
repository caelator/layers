name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  RUSTFLAGS: "-D warnings"

jobs:
  clippy:
    name: Clippy (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git clone --depth 1 https://github.com/caelator/substrate.git ../substrate
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git clone --depth 1 https://github.com/caelator/substrate.git ../substrate
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: rustfmt
      - run: cargo fmt -- --check

  destructive-diff:
    name: Destructive-diff guard
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for destructive changes
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          # Count total files in base and deletions in diff
          total_files=$(git ls-tree -r --name-only "$BASE" | wc -l)
          deleted_files=$(git diff --diff-filter=D --name-only "$BASE" "$HEAD" | wc -l)

          echo "Base files: $total_files"
          echo "Deleted in PR: $deleted_files"

          if [ "$total_files" -gt 0 ] && [ "$deleted_files" -gt 0 ]; then
            delete_pct=$((deleted_files * 100 / total_files))
            echo "Deletion percentage: $delete_pct%"
            if [ "$delete_pct" -gt 30 ]; then
              echo "::error::BLOCKED: PR deletes $deleted_files of $total_files files ($delete_pct%). This looks like a destructive rollback."
              exit 1
            fi
            if [ "$delete_pct" -gt 10 ]; then
              echo "::warning::PR deletes $deleted_files of $total_files files ($delete_pct%). Please verify this is intentional."
            fi
          fi

          # Check for history-rewriting indicators
          if git diff "$BASE" "$HEAD" -- .gitattributes | grep -q "filter=lfs"; then
            echo "::warning::PR modifies LFS filters — verify this doesn't orphan tracked objects."
          fi

          echo "Destructive-diff check passed."

  repo-doctor:
    name: Repo doctor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run repo-doctor health checks
        run: |
          chmod +x ./repo-doctor.sh
          ./repo-doctor.sh --ci
