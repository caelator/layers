[package]
name = "layers"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"

authors = ["Caelator + OpenClaw"]
description = "Council orchestrator and memory spine for multi-model AI workflows"
license = "MIT"
readme = "README.md"
repository = "https://github.com/caelator/layers"
keywords = ["cli", "memory", "code-intelligence", "gitnexus", "local-first"]
categories = ["command-line-utilities", "development-tools"]

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
libc = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
wait-timeout = "0.2"

[dev-dependencies]
libc = "0.2"
