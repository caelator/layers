[package]
name = "layers"
version = "0.1.0"
edition = "2024"

authors = ["Caelator + OpenClaw"]
description = "Local-first context router integrating Memoryport and GitNexus"
license = "MIT"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
